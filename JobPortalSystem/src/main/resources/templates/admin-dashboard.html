<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header>
    <div class="logo">JobPortal Pro</div>
    <nav>
        <a th:href="@{/jobs}">Browse Jobs</a>
        <form th:action="@{/logout}" method="post" style="display:inline;"><button class="primary" type="submit" style="background:#0e2a65;">Logout</button></form>
    </nav>
</header>
<section class="section">
    <h2>Admin Dashboard</h2>
    <p class="lead">Overview of users, jobs, and application metrics for administrative management.</p>
    <div class="dashboard-grid" style="grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));">
        <div class="dashboard-card"><h3>Users</h3><p th:text="${totalUsers}"></p></div>
        <div class="dashboard-card"><h3>Jobs</h3><p th:text="${totalJobs}"></p></div>
        <div class="dashboard-card"><h3>Applications</h3><p th:text="${totalApplications}"></p></div>
    </div>
</section>
<section class="section" style="background:#edf4ff;">
    <div class="card">
        <h3>Manage Users</h3>
        <ul class="panel-list">
            <li th:each="u : ${users}">
                <strong th:text="${u.name}"></strong> • <span th:text="${u.email}"></span> • <span th:text="${u.role}"></span>
            </li>
        </ul>
    </div>
</section>
<section class="section">
    <div class="card">
        <h3>Manage Jobs</h3>
        <ul class="panel-list">
            <li th:each="job : ${jobs}">
                <strong th:text="${job.title}"></strong> • <span th:text="${job.location}"></span>
                <p><small th:text="${job.postedBy}"></small></p>
            </li>
        </ul>
    </div>
</section>
<footer>
    <p>Admin controls are available for user and job oversight across the platform.</p>
</footer>
</body>
</html>
