<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${job.title} + ' - Job Details'">Job Details</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header>
    <div class="logo">JobPortal Pro</div>
    <nav>
        <a th:href="@{/}">Home</a>
        <a th:href="@{/jobs}">Browse Jobs</a>
        <a th:href="@{/dashboard}">Dashboard</a>
    </nav>
</header>
<section class="section">
    <div class="card">
        <div class="badge" th:text="${job.location}">Location</div>
        <h2 th:text="${job.title}">Job Title</h2>
        <p th:text="${job.description}">Job description details</p>
        <p><strong>Skills:</strong> <span th:text="${job.skills}"></span></p>
        <p><strong>Salary:</strong> <span th:text="${job.salary}"></span></p>
        <p><strong>Posted by:</strong> <span th:text="${job.postedBy}"></span></p>
        <div class="action-panel">
            <a th:href="@{'/jobs/' + ${job.id} + '/apply'}" class="primary">Apply now</a>
        </div>
    </div>
</section>
<footer>
    <p>Apply securely with a resume upload and track your candidate status.</p>
</footer>
</body>
</html>
