<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - JobPortal Pro</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<header>
    <div class="logo">JobPortal Pro</div>
    <nav>
        <a th:href="@{/}">Home</a>
        <a th:href="@{/login}">Login</a>
    </nav>
</header>
<section class="section">
    <div class="card">
        <h2>Create your account</h2>
        <p class="lead">Register as a student, employer, or admin to access the matching dashboard.</p>
        <div th:if="${error}" class="error" th:text="${error}"></div>
        <div th:if="${success}" class="success" th:text="${success}"></div>
        <form th:action="@{/register}" method="post">
            <input type="text" name="name" placeholder="Full name" required>
            <input type="email" name="email" placeholder="Email address" required>
            <input type="password" name="password" placeholder="Password" required>
            <select name="role" required>
                <option value="">Choose role</option>
                <option value="JOB_SEEKER">Student</option>
                <option value="EMPLOYER">Employer</option>
                <option value="ADMIN">Admin</option>
            </select>
            <button class="primary" type="submit">Create account</button>
        </form>
        <p>Already registered? <a th:href="@{/login}">Sign in</a></p>
    </div>
</section>
<footer>
    <p>Professional registration experience for every role.</p>
</footer>
</body>
</html>
